version: 2

models:
  - name: stg_players
    description: Cleaned player profile metadata from the NHL API. One row per player.
    columns:
      - name: player_id
        description: NHL API player identifier.
        tests:
          - unique
          - not_null
      - name: full_name
        description: Full player name.
        tests:
          - not_null
      - name: position
        description: Player position (C, LW, RW, D, G).
      - name: birth_country
        description: Three-letter country code (e.g. CAN, USA, SWE).

  - name: stg_player_season_stats
    description: >
      Typed and cleaned regular-season stats per player per season.
      Covers Wayne Gretzky and a set of all-time scoring peers for comparison.
    columns:
      - name: player_id
        description: NHL API player identifier.
        tests:
          - not_null
      - name: season_year
        description: The calendar year the season ended (e.g. 1980 for the 1979-80 season).
        tests:
          - not_null
      - name: games_played
        description: Regular season games played. Rows with 0 games are filtered out.
        tests:
          - not_null
      - name: points
        description: Total points (goals + assists) for the season.

  - name: stg_teams
    description: NHL team reference data from the teams seed. One row per franchise.
    columns:
      - name: team_abbr
        description: Three or four-letter team abbreviation.
        tests:
          - unique
          - not_null
      - name: conference
        description: Eastern or Western.
        tests:
          - not_null
          - accepted_values:
              values: ['Eastern', 'Western']
      - name: division
        description: Division name (e.g. Atlantic, Pacific).
        tests:
          - not_null

  - name: stg_award_winners
    description: >
      Art Ross Trophy (leading scorer) and Hart Trophy (MVP) winners from 1980–1999.
      Sourced from the award_winners seed. One row per award per season.
    columns:
      - name: award_name
        description: Name of the award.
        tests:
          - not_null
          - accepted_values:
              values: ['Art Ross Trophy', 'Hart Trophy']
      - name: season_year
        description: Season end-year the award was given.
        tests:
          - not_null
      - name: winner
        description: Player who won the award.
        tests:
          - not_null
