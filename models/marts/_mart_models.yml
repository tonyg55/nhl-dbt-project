version: 2

models:
  - name: fct_gretzky_career
    description: >
      Single-row career summary for Wayne Gretzky. Combines season-stat aggregations
      with trophy and Stanley Cup counts. Intended for the website's hero career card.
    columns:
      - name: player_id
        description: NHL API player identifier (8447400 for Gretzky).
        tests:
          - not_null
      - name: career_games
        description: Total regular-season games played across all 20 NHL seasons.
        tests:
          - not_null
      - name: career_goals
        description: Total regular-season goals. NHL record — 894.
        tests:
          - not_null
      - name: career_assists
        description: >
          Total regular-season assists. NHL record — 1,963. Famously exceeds the
          total career point totals of every other player in NHL history.
        tests:
          - not_null
      - name: career_points
        description: Total regular-season points (goals + assists). NHL record — 2,857.
        tests:
          - not_null
      - name: points_per_game
        description: Career points divided by games played. Rounded to 3 decimal places.
        tests:
          - not_null
      - name: hart_trophies
        description: Number of Hart Trophy (MVP) wins. Gretzky won 9.
        tests:
          - not_null
      - name: art_ross_trophies
        description: Number of Art Ross Trophy (leading scorer) wins. Gretzky won 10.
        tests:
          - not_null
      - name: stanley_cups
        description: Stanley Cup championships as a member of the Edmonton Oilers (1984, 1985, 1987, 1988).
        tests:
          - not_null

  - name: fct_gretzky_dominance
    description: >
      Career scoring comparison across Gretzky and all-time peers loaded by the
      ingest script. One row per player, ranked by career points. Includes
      assists_only_gap — how many more points Gretzky's assists alone total
      compared to each player's entire career point total. Powers the leaderboard
      and bar chart visuals on the website.
    columns:
      - name: player_id
        description: NHL API player identifier.
        tests:
          - not_null
          - unique
      - name: player_name
        description: Full player name.
        tests:
          - not_null
      - name: all_time_points_rank
        description: Rank among players in this dataset by career points (1 = most).
        tests:
          - not_null
      - name: career_points
        description: Total regular-season career points.
        tests:
          - not_null
      - name: points_behind_gretzky
        description: >
          How many points behind Gretzky's 2,857 this player's career total is.
          0 for Gretzky himself.
      - name: assists_only_gap
        description: >
          Gretzky's career assists (1,963) minus this player's career points total.
          A positive number means Gretzky's assists alone beat this player's entire
          career point total — true for every other player in the dataset.
      - name: is_gretzky
        description: Boolean flag identifying the Gretzky row for front-end highlighting.
        tests:
          - not_null
